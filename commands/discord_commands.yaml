- name: dashboard
  description: Post the map rotation dashboard in this channel
  type: 1

- name: played
  description: Mark a map as played
  type: 1
  options:
    - name: map
      description: The map to mark as played
      type: 3
      required: true
      choices:
        - name: Ancient
          value: ancient
        - name: Anubis
          value: anubis
        - name: Dust II
          value: dust2
        - name: Inferno
          value: inferno
        - name: Mirage
          value: mirage
        - name: Nuke
          value: nuke
        - name: Overpass
          value: overpass

- name: remaining
  description: Show maps not yet played this cycle
  type: 1

- name: history
  description: Show maps played this cycle in order
  type: 1

- name: undo
  description: Unmark the most recently played map
  type: 1

- name: unmark
  description: Unmark a specific map
  type: 1
  options:
    - name: map
      description: The map to unmark
      type: 3
      required: true
      choices:
        - name: Ancient
          value: ancient
        - name: Anubis
          value: anubis
        - name: Dust II
          value: dust2
        - name: Inferno
          value: inferno
        - name: Mirage
          value: mirage
        - name: Nuke
          value: nuke
        - name: Overpass
          value: overpass

- name: reset
  description: Reset the current cycle
  type: 1

- name: pago
  description: Marca presença no treino de hoje
  type: 1
  dm_permission: false

- name: despago
  description: Desfaz o /pago de hoje (mesmo dia apenas)
  type: 1
  dm_permission: false

- name: placar
  description: Mostra o ranking de treinos
  type: 1
  dm_permission: false

- name: meu-pago
  description: Mostra sua posição no placar (visível só para você)
  type: 1
  dm_permission: false

- name: pago-remove
  description: (Admin) Remove um usuário do placar
  type: 1
  default_member_permissions: "8"
  dm_permission: false
  options:
    - name: user
      description: Usuário a remover
      type: 6
      required: true
